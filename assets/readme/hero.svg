<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="420" viewBox="0 0 1200 420"
     role="img" aria-labelledby="title desc">
  <title id="title">HH Job Assistant — меньше рутины при поиске работы</title>
  <desc id="desc">Расширение проводит вакансии через подготовку сопроводительных писем и ответов к отправленным откликам.</desc>

  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#080C16"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#surface)"/>
  <path d="M0 322C194 274 322 388 527 333C748 274 858 181 1200 230V420H0Z" fill="#0E1526"/>
  <circle cx="75" cy="69" r="18" fill="#D6001C"/>
  <text x="75" y="76" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="800" fill="#FFFFFF">hh</text>
  <text x="105" y="76"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" fill="#CBD5E1">JOB ASSISTANT</text>

  <g id="title-block" transform="translate(64 112)">
    <text x="0" y="54"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="62" font-weight="800" fill="#F8FAFC">Отклики.</text>
    <text x="0" y="119"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="62" font-weight="800" fill="#F8FAFC">Без рутины.</text>
    <rect x="0" y="151" width="72" height="5" rx="2.5" fill="#D6001C"/>
    <text x="0" y="205"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="23" font-weight="500" fill="#A9B6CA">
      Письма, вопросы работодателя и контроль результата
    </text>
    <text x="0" y="238"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="23" font-weight="500" fill="#A9B6CA">
      в одном Chrome-расширении для hh.ru
    </text>
  </g>

  <g id="application-pipeline" transform="translate(700 50)">
    <path d="M80 76V112M80 188V224M80 300V330" stroke="#34435B" stroke-width="3" stroke-linecap="round"/>
    <circle cx="80" cy="94" r="5" fill="#D6001C"/>
    <circle cx="80" cy="206" r="5" fill="#55D6BE"/>
    <circle cx="80" cy="318" r="5" fill="#55D6BE"/>

    <g id="vacancy-card">
      <rect x="0" y="0" width="432" height="76" rx="16" fill="#171F30" stroke="#2D3A50"/>
      <rect x="20" y="19" width="38" height="38" rx="10" fill="#D6001C"/>
      <path d="M31 31H47M31 38H47M31 45H42" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
      <text x="76" y="32"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="20" font-weight="700" fill="#F8FAFC">Подходящие вакансии</text>
      <text x="76" y="55"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#93A4BD">страница поиска hh.ru</text>
    </g>

    <g id="ai-card" transform="translate(0 112)">
      <rect x="0" y="0" width="432" height="76" rx="16" fill="#171F30" stroke="#2D3A50"/>
      <rect x="20" y="19" width="38" height="38" rx="10" fill="#24384B"/>
      <path d="M30 39L37 46L49 29" fill="none" stroke="#55D6BE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="32"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="20" font-weight="700" fill="#F8FAFC">Готовые тексты</text>
      <text x="76" y="55"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#93A4BD">письма + ответы на формы</text>
    </g>

    <g id="result-card" transform="translate(0 224)">
      <rect x="0" y="0" width="432" height="76" rx="16" fill="#171F30" stroke="#2D3A50"/>
      <rect x="20" y="19" width="38" height="38" rx="19" fill="#163D39"/>
      <path d="M30 39L37 46L49 29" fill="none" stroke="#55D6BE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="32"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="20" font-weight="700" fill="#F8FAFC">Результат под контролем</text>
      <text x="76" y="55"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#93A4BD">отправлено · пропущено · вручную</text>
    </g>

    <g transform="translate(0 330)">
      <rect width="198" height="40" rx="20" fill="#D6001C"/>
      <text x="99" y="27" text-anchor="middle"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="18" font-weight="700" fill="#FFFFFF">Запустить отклики</text>
      <rect x="214" width="128" height="40" rx="20" fill="#171F30" stroke="#34435B"/>
      <text x="278" y="27" text-anchor="middle"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="18" font-weight="700" fill="#CBD5E1">Остановить</text>
    </g>
  </g>
</svg>
