<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Настройки HH Job Assistant</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        color: #1f2937;
        background: #f6f8fb;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }

      h2 {
        margin: 24px 0 12px;
        font-size: 18px;
      }

      label {
        display: block;
        margin: 16px 0 6px;
        font-weight: 700;
      }

      input,
      select,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #b8c4d4;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 130px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 16px;
        font-weight: 400;
      }

      .checkbox input {
        width: auto;
      }

      .page-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 20px;
      }

      .switch {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0;
        font-weight: 700;
        white-space: nowrap;
      }

      .switch input {
        position: absolute;
        inline-size: 1px;
        block-size: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .switch-track {
        position: relative;
        width: 46px;
        height: 26px;
        border-radius: 999px;
        background: #94a3b8;
        transition: background .16s ease;
      }

      .switch-track::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 2px rgba(15, 23, 42, .22);
        transition: transform .16s ease;
      }

      .switch input:checked + .switch-track {
        background: #16a34a;
      }

      .switch input:checked + .switch-track::after {
        transform: translateX(20px);
      }

      .switch input:focus-visible + .switch-track {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }

      button {
        border: 1px solid #1f5fbf;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: #f1f5f9;
        color: #1f2937;
        border-color: #b8c4d4;
        box-shadow: 0 1px 2px rgba(15, 23, 42, .12);
      }

      #status {
        min-height: 20px;
        margin-top: 16px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="page-head">
        <h1>HH Job Assistant</h1>
        <label class="switch" for="agentDebugLogsEnabled">
          <span>Диагностический режим</span>
          <input id="agentDebugLogsEnabled" type="checkbox">
          <span class="switch-track" aria-hidden="true"></span>
        </label>
      </div>

      <label for="resumeUrl">Ссылка на резюме hh.ru</label>
      <input id="resumeUrl" type="url" placeholder="https://hh.ru/resume/...">

      <label for="resumeCacheTtlHours">Кэш резюме, часов</label>
      <input id="resumeCacheTtlHours" type="number" min="0.1" step="0.5">

      <label for="expectedSalary">Ожидаемая зарплата для ответов</label>
      <input id="expectedSalary" type="text" placeholder="Например: 250 000 руб. на руки">

      <div class="row">
        <div>
          <label for="employmentPreference">Формат оформления</label>
          <select id="employmentPreference">
            <option value="">Не выбрано</option>
            <option value="individual_entrepreneur">ИП</option>
            <option value="labor_contract">ТК</option>
            <option value="any">Любой</option>
          </select>
        </div>
        <div>
          <label for="workFormatPreference">Формат работы</label>
          <select id="workFormatPreference">
            <option value="">Не выбрано</option>
            <option value="remote">Удаленка</option>
            <option value="hybrid">Гибрид</option>
            <option value="office">Офис</option>
            <option value="any">Любой</option>
          </select>
        </div>
      </div>

      <label for="coverPrompt">Промпт для сопроводительного письма</label>
      <textarea id="coverPrompt"></textarea>

      <div class="row">
        <div>
          <label for="dailyLimit">Дневной лимит откликов</label>
          <input id="dailyLimit" type="number" min="1" max="100">
        </div>
        <div>
          <label for="delayMinMs">Минимальная пауза, мс</label>
          <input id="delayMinMs" type="number" min="500" step="250">
        </div>
        <div>
          <label for="delayMaxMs">Максимальная пауза, мс</label>
          <input id="delayMaxMs" type="number" min="500" step="250">
        </div>
      </div>

      <h2>Groq API</h2>
      <label for="groqModel">Модель Groq</label>
      <select id="groqModel">
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B Versatile</option>
        <option value="llama-3.1-8b-instant">Llama 3.1 8B Instant</option>
        <option value="openai/gpt-oss-120b">OpenAI GPT-OSS 120B</option>
        <option value="openai/gpt-oss-20b">OpenAI GPT-OSS 20B</option>
      </select>

      <label for="groqApiKey">Ключ Groq API</label>
      <input id="groqApiKey" type="password" autocomplete="off" placeholder="gsk_...">

      <div class="actions">
        <button id="save">Сохранить</button>
        <button id="testGroq" class="secondary">Проверить Groq</button>
      </div>

      <div id="status" role="status"></div>
    </main>
    <script src="error-text.js"></script>
    <script src="defaults.js"></script>
    <script src="options.js"></script>
  </body>
</html>
