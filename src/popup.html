<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HH Job Assistant</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        color: #172033;
        background: #fff;
      }

      body {
        width: 340px;
        margin: 0;
        padding: 14px;
      }

      body.window-mode {
        box-sizing: border-box;
        width: 100%;
        min-width: 380px;
        min-height: 560px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        min-height: 38px;
        border: 1px solid #1f5fbf;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        font: 13px Arial, sans-serif;
        cursor: pointer;
      }

      button.secondary {
        background: #fff;
        border-color: #b8c4d4;
        color: #172033;
      }

      button.danger {
        background: #dc2626;
        border-color: #991b1b;
      }

      .settings {
        display: grid;
        gap: 8px;
        margin-top: 12px;
        padding: 10px;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #fff;
      }

      label {
        font-size: 12px;
        font-weight: 700;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        min-height: 34px;
        border: 1px solid #b8c4d4;
        border-radius: 6px;
        padding: 8px 10px;
        font: 13px Arial, sans-serif;
      }

      .settings-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      dl {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px 12px;
        margin: 14px 0 0;
        padding: 10px;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #f8fafc;
      }

      dt,
      dd {
        margin: 0;
        font-size: 13px;
      }

      dd {
        font-weight: 700;
      }

      #lastError {
        margin-top: 10px;
        min-height: 18px;
        color: #b91c1c;
        font-size: 12px;
        word-break: break-word;
      }

      #statusLine {
        margin-top: 10px;
        color: #475569;
        font-size: 12px;
      }

      #recentResults {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .result {
        padding: 8px;
        border: 1px solid #d8e0ea;
        border-radius: 6px;
        background: #f8fafc;
        font-size: 12px;
      }

      .result.warn {
        border-color: #f3c969;
        background: #fffbeb;
        color: #7c4a03;
      }

      .result.error {
        border-color: #f2a1a1;
        background: #fef2f2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <h1>HH Job Assistant</h1>
    <div class="grid">
      <button id="dryRun" class="secondary">Предпросмотр</button>
      <button id="autoApply">Запустить отклики</button>
      <button id="stop" class="danger">Стоп</button>
      <button id="refreshResumes" class="secondary">Обновить резюме</button>
      <button id="openWindow" class="secondary">Открыть окном</button>
      <button id="openOptions" class="secondary">Настройки</button>
    </div>

    <section class="settings" aria-label="Groq settings">
      <label for="groqApiKey">Groq API key</label>
      <input id="groqApiKey" type="password" autocomplete="off" placeholder="gsk_...">
      <div class="settings-actions">
        <button id="saveGroqKey" class="secondary">Save key</button>
        <button id="testGroq" class="secondary">Test Groq</button>
      </div>
    </section>

    <dl>
      <dt>Статус</dt>
      <dd id="state">Ожидание</dd>
      <dt>Найдено</dt>
      <dd id="found">0</dd>
      <dt>Проверено</dt>
      <dd id="processed">0</dd>
      <dt>Отправлено</dt>
      <dd id="applied">0</dd>
      <dt>Пропущено</dt>
      <dd id="skipped">0</dd>
      <dt>Ошибки</dt>
      <dd id="errors">0</dd>
    </dl>

    <div id="lastError"></div>
    <div id="statusLine">Откройте страницу hh.ru с вакансиями и запустите проверку.</div>
    <div id="recentResults" aria-live="polite"></div>
    <script src="popup.js"></script>
  </body>
</html>
