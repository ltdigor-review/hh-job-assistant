<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HH Job Assistant</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        color: #172033;
        background: #fff;
      }

      body {
        width: 340px;
        min-height: 560px;
        margin: 0;
        padding: 14px;
        box-sizing: border-box;
        overflow-y: auto;
      }

      h1 {
        font-size: 18px;
        margin: 0;
      }

      .header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      #version {
        color: #94a3b8;
        font-size: 10px;
        line-height: 1;
        white-space: nowrap;
      }

      .health {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        padding: 10px;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #f8fafc;
      }

      .health-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
      }

      .health-value {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 190px;
        font-weight: 700;
        text-align: right;
      }

      .health-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #94a3b8;
        flex: 0 0 auto;
      }

      .health-value.ok {
        color: #166534;
      }

      .health-value.ok .health-dot {
        background: #22c55e;
      }

      .health-value.warn {
        color: #92400e;
      }

      .health-value.warn .health-dot {
        background: #f59e0b;
      }

      .health-value.error {
        color: #991b1b;
      }

      .health-value.error .health-dot {
        background: #ef4444;
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      .action-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        min-height: 38px;
        border: 1px solid #1f5fbf;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        font: 13px Arial, sans-serif;
        cursor: pointer;
      }

      button.secondary {
        background: #f1f5f9;
        border-color: #b8c4d4;
        color: #172033;
        box-shadow: 0 1px 2px rgba(15, 23, 42, .12);
      }

      button.danger {
        background: #dc2626;
        border-color: #991b1b;
      }

      .settings {
        display: grid;
        gap: 8px;
        margin-top: 12px;
        padding: 10px;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #fff;
      }

      label {
        font-size: 12px;
        font-weight: 700;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        min-height: 34px;
        border: 1px solid #b8c4d4;
        border-radius: 6px;
        padding: 8px 10px;
        font: 13px Arial, sans-serif;
      }

      .settings-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      dl {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px 12px;
        margin: 14px 0 0;
        padding: 10px;
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #f8fafc;
      }

      dt,
      dd {
        margin: 0;
        font-size: 13px;
      }

      dd {
        font-weight: 700;
      }

      #lastError {
        margin-top: 10px;
        min-height: 18px;
        color: #b91c1c;
        font-size: 12px;
        word-break: break-word;
      }

      #statusLine {
        margin-top: 10px;
        color: #475569;
        font-size: 12px;
      }

      #recentResults {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .result {
        padding: 8px;
        border: 1px solid #d8e0ea;
        border-radius: 6px;
        background: #f8fafc;
        font-size: 12px;
      }

      .result.warn {
        border-color: #f3c969;
        background: #fffbeb;
        color: #7c4a03;
      }

      .result.error {
        border-color: #f2a1a1;
        background: #fef2f2;
        color: #991b1b;
      }

      .reports-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 14px;
      }

      .reports-head h2 {
        margin: 0;
        font-size: 14px;
      }

      #clearReports {
        min-height: 30px;
        padding: 4px 8px;
      }

      #chatReports {
        display: grid;
        gap: 6px;
        margin-top: 8px;
      }

      .report {
        padding: 8px;
        border: 1px solid #d8e0ea;
        border-radius: 6px;
        background: #fff;
        font-size: 12px;
      }

      .report a {
        color: #1d4ed8;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>HH Job Assistant</h1>
      <span id="version" aria-label="Version"></span>
    </header>

    <section class="health" aria-label="Extension status">
      <div class="health-row">
        <span>Расширение</span>
        <span id="extensionStatus" class="health-value warn">
          <span class="health-dot" aria-hidden="true"></span>
          Проверяю
        </span>
      </div>
      <div class="health-row">
        <span>Текущая вкладка</span>
        <span id="tabStatus" class="health-value warn">
          <span class="health-dot" aria-hidden="true"></span>
          Проверяю
        </span>
      </div>
    </section>

    <div class="actions">
      <button id="dryRun" class="secondary">Предпросмотр</button>
      <div class="action-row">
        <button id="autoApply">Запустить отклики</button>
        <button id="stop" class="danger">Стоп</button>
      </div>
      <button id="refreshResumes" class="secondary">Обновить резюме</button>
      <button id="chatAssist" class="secondary">Обработка чатов</button>
      <button id="openOptions" class="secondary">Настройки</button>
    </div>

    <section class="settings" aria-label="Groq settings">
      <label for="groqApiKey">Groq API key</label>
      <input id="groqApiKey" type="password" autocomplete="off" placeholder="gsk_...">
      <div class="settings-actions">
        <button id="saveGroqKey" class="secondary">Save key</button>
        <button id="testGroq" class="secondary">Test Groq</button>
      </div>
    </section>

    <dl>
      <dt>Статус</dt>
      <dd id="state">Ожидание</dd>
      <dt>Найдено</dt>
      <dd id="found">0</dd>
      <dt>Отправлено</dt>
      <dd id="applied">0</dd>
      <dt>Пропущено</dt>
      <dd id="skipped">0</dd>
      <dt>Ошибки</dt>
      <dd id="errors">0</dd>
    </dl>

    <div id="statusLine">Откройте страницу hh.ru с вакансиями и запустите проверку.</div>
    <div id="lastError"></div>
    <div id="recentResults" aria-live="polite"></div>
    <section aria-label="Chat reports">
      <div class="reports-head">
        <h2>Chat reports</h2>
        <button id="clearReports" class="secondary">Clear</button>
      </div>
      <div id="chatReports" aria-live="polite"></div>
    </section>
    <script src="popup.js"></script>
  </body>
</html>
