<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HH Job Assistant</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Arial, sans-serif;
        color: #1f2933;
        background: #f5f7fa;
      }

      * {
        box-sizing: border-box;
      }

      html {
        width: 380px;
        height: 600px;
        overflow: hidden;
      }

      body {
        width: 380px;
        height: 600px;
        margin: 0;
        padding: 14px;
        overflow-y: auto;
        background: #f5f7fa;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      button {
        min-height: 38px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 12px;
        font: 700 13px/1 Arial, sans-serif;
        cursor: pointer;
        transition: background .15s ease, border-color .15s ease, color .15s ease, opacity .15s ease;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: .45;
      }

      .shell {
        display: grid;
        gap: 10px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        font-size: 18px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .header-meta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      #version {
        color: #6b7280;
        font-size: 11px;
        line-height: 1;
        white-space: nowrap;
      }

      .icon-button {
        width: 30px;
        min-height: 30px;
        height: 30px;
        padding: 0;
        display: inline-grid;
        place-items: center;
        border-color: #d4dbe5;
        background: #fff;
        color: #1f2933;
        font-size: 16px;
        box-shadow: 0 1px 2px rgba(17, 24, 39, .08);
      }

      .panel {
        border: 1px solid #d9e1ea;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 1px 2px rgba(17, 24, 39, .04);
      }

      .status-panel {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        padding: 12px;
      }

      .status-dot {
        width: 12px;
        height: 12px;
        margin-top: 3px;
        border-radius: 999px;
        background: #9ca3af;
        box-shadow: 0 0 0 4px rgba(156, 163, 175, .14);
      }

      .status-panel.ok .status-dot {
        background: #16a34a;
        box-shadow: 0 0 0 4px rgba(22, 163, 74, .13);
      }

      .status-panel.warn .status-dot {
        background: #f59e0b;
        box-shadow: 0 0 0 4px rgba(245, 158, 11, .16);
      }

      .status-panel.error .status-dot {
        background: #dc2626;
        box-shadow: 0 0 0 4px rgba(220, 38, 38, .13);
      }

      .status-title {
        font-size: 16px;
        font-weight: 800;
        line-height: 1.2;
        word-break: break-word;
        user-select: text;
      }

      .status-detail,
      .muted {
        color: #64748b;
        font-size: 12px;
        line-height: 1.35;
        user-select: text;
      }

      .section {
        display: grid;
        gap: 8px;
        padding: 11px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .section-head h2 {
        font-size: 12px;
        font-weight: 800;
        color: #667085;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .action-title {
        font-size: 13px;
        font-weight: 800;
        line-height: 1.3;
        word-break: break-word;
        user-select: text;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .primary {
        grid-column: 1 / 2;
        border-color: #b91c1c;
        background: #d71920;
        color: #fff;
      }

      .danger {
        border-color: #d4dbe5;
        background: #fff;
        color: #b91c1c;
      }

      .secondary {
        border-color: #d4dbe5;
        background: #f8fafc;
        color: #1f2933;
      }

      .counter-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .counter {
        min-width: 0;
        padding: 8px 6px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #f8fafc;
        text-align: center;
      }

      .counter-value {
        display: block;
        font-size: 16px;
        font-weight: 800;
        line-height: 1.1;
      }

      .counter-label {
        display: block;
        margin-top: 3px;
        color: #64748b;
        font-size: 10px;
        line-height: 1.1;
        white-space: nowrap;
      }

      .list {
        display: grid;
        gap: 6px;
        max-height: 132px;
        overflow-y: auto;
        padding-right: 1px;
      }

      .result,
      .report {
        display: grid;
        gap: 6px;
        padding: 8px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #f8fafc;
        font-size: 12px;
        line-height: 1.35;
        user-select: text;
      }

      .result.warn {
        border-color: #f3c969;
        background: #fffbeb;
        color: #7c4a03;
      }

      .result.error {
        border-color: #f2a1a1;
        background: #fef2f2;
        color: #991b1b;
      }

      .result.copyable {
        grid-template-columns: auto minmax(0, 1fr);
        align-items: start;
      }

      .result-text {
        min-width: 0;
        word-break: break-word;
      }

      .report a {
        color: #b91c1c;
        word-break: break-word;
      }

      .small-button {
        min-height: 28px;
        padding: 0 8px;
        font-size: 12px;
      }

      .copy-button {
        width: 28px;
        min-height: 28px;
        height: 28px;
        padding: 0;
        justify-self: start;
        border-color: #d4dbe5;
        background: #fff;
        color: #475569;
        font-size: 13px;
        line-height: 1;
      }

      .copy-toast {
        position: fixed;
        left: 50%;
        top: 14px;
        z-index: 10;
        padding: 8px 10px;
        border: 1px solid #bbf7d0;
        border-radius: 8px;
        background: #ecfdf5;
        color: #166534;
        font: 800 12px/1 Arial, sans-serif;
        box-shadow: 0 6px 16px rgba(17, 24, 39, .16);
        transform: translateX(-50%);
        pointer-events: none;
      }

    </style>
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>HH Job Assistant</h1>
        <div class="header-meta">
          <span id="version" aria-label="Версия"></span>
          <button id="openOptions" class="icon-button" type="button" title="Настройки" aria-label="Настройки">⚙</button>
        </div>
      </header>

      <section id="appStatus" class="panel status-panel warn" aria-label="Статус расширения">
        <span id="appStatusDot" class="status-dot" aria-hidden="true"></span>
        <div>
          <div id="appStatusTitle" class="status-title">Проверяю</div>
          <p id="appStatusDetail" class="status-detail">Проверяю hh.ru и настройки Groq</p>
        </div>
      </section>

      <section class="panel section" aria-label="Текущее действие">
        <div class="section-head">
          <h2>Текущее действие</h2>
        </div>
        <div id="currentAction" class="action-title">Ожидание</div>
      </section>

      <section class="panel section" aria-label="Управление">
        <div class="actions">
          <button id="autoApply" class="primary" type="button">Запуск откликов</button>
          <button id="continueApply" class="secondary" type="button" disabled>Продолжить</button>
          <button id="stop" class="danger" type="button" disabled>Стоп</button>
          <button id="refreshResumes" class="secondary" type="button">Поднятие резюме</button>
        </div>
      </section>

      <section class="panel section" aria-label="Счетчики">
        <div class="counter-grid">
          <div class="counter">
            <span id="applied" class="counter-value">0</span>
            <span class="counter-label">Отклики</span>
          </div>
          <div class="counter">
            <span id="skipped" class="counter-value">0</span>
            <span class="counter-label">Пропуски</span>
          </div>
          <div class="counter">
            <span id="errors" class="counter-value">0</span>
            <span class="counter-label">Ошибки</span>
          </div>
        </div>
      </section>

      <section class="panel section" aria-label="Последние действия">
        <div class="section-head">
          <h2>Последние действия</h2>
        </div>
        <div id="recentResults" class="list" aria-live="polite"></div>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
